name: CI

on:
  pull_request:
    branches:
      - main
      - gh/**
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml

  test-cuda:
    name: Test CUDA
    needs: build
    uses: ./.github/workflows/test-cuda.yml
    with:
      artifact-name: ${{ needs.build.outputs.cuda-artifact }}

  test-cpu:
    name: Test CPU
    needs: build
    uses: ./.github/workflows/test-cpu.yml
    with:
      artifact-name: ${{ needs.build.outputs.cpu-artifact }}

  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [build, test-cuda, test-cpu]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          if [[ "${{ needs.build.result }}" != "success" ]] || 
             [[ "${{ needs.test-cuda.result }}" != "success" ]] || 
             [[ "${{ needs.test-cpu.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          else
            echo "All jobs passed"
          fi